<main class="container my-5">
    <h1 class="text-center mb-4">We Value Your Feedback</h1>
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <form action="acknowledgement.html" method="get">
                <div class="mb-3">
                    <label for="visitorName" class="form-label">Your Name</label>
                    <input type="text" class="form-control" id="visitorName" name="visitorName" placeholder="Enter your name" required>
                </div>
                
                <div class="mb-3">
                    <label for="visitorEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="visitorEmail" name="visitorEmail" placeholder="name@example.com" required>
                    <div class="form-text">We'll never share your email.</div>
                </div>
                
                <div class="mb-3">
                    <label for="visitorMessage" class="form-label">Your Message</label>
                    <textarea class="form-control" id="visitorMessage" name="visitorMessage" rows="5" placeholder="Tell us about your favorite club or suggest an improvement..." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Send Feedback</button>
            </form>
        </div>
    </div>
